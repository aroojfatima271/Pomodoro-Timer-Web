<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro — Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f0ede6;
      --muted: #6b6660;
      --focus-color: #e8c97a;
      --break-color: #7ac4e8;
      --pause-color: #b0a8a0;
      --accent: var(--focus-color);
      --ring-size: min(62vw, 320px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .mode-tab {
      padding: 0.4rem 1.1rem;
      border-radius: 100px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .mode-tab.active {
      background: var(--accent);
      color: #0d0d0d;
      font-weight: 500;
    }

    /* Ring timer */
    .ring-wrap {
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
      margin-bottom: 2rem;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 6;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 8px var(--accent));
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .timer-display {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 14vw, 5.5rem);
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
      transition: color 0.4s ease;
    }

    .timer-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      transition: color 0.4s ease;
    }

    .session-count {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 100px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      padding: 0.85rem 2.5rem;
      background: var(--accent);
      color: #0d0d0d;
      border-color: var(--accent);
      font-weight: 500;
      font-size: 0.8rem;
    }

    .btn-primary:hover {
      opacity: 0.85;
      color: #0d0d0d;
      transform: scale(1.03);
    }

    .btn-sm {
      padding: 0.6rem 1.2rem;
      font-size: 0.65rem;
    }

    /* Settings */
    .settings {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .setting-group label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .setting-group input {
      width: 56px;
      padding: 0.4rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      text-align: center;
      transition: border-color 0.2s;
    }

    .setting-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Divider */
    .divider {
      width: 100%;
      max-width: 420px;
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    /* History */
    .history-section {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.7s 0.55s ease both;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .history-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
    }

    .history-header span {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: slideIn 0.35s ease both;
    }

    .history-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--focus-color);
      flex-shrink: 0;
    }

    .history-dot.break { background: var(--break-color); }

    .history-text {
      font-size: 0.72rem;
      color: var(--text);
      flex: 1;
    }

    .history-time {
      font-size: 0.62rem;
      color: var(--muted);
    }

    .history-empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    /* Session done overlay */
    .done-flash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 13, 13, 0.85);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .done-flash.show {
      opacity: 1;
      pointer-events: all;
    }

    .done-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 0 60px color-mix(in srgb, var(--accent) 20%, transparent);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .done-flash.show .done-card {
      transform: scale(1);
    }

    .done-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 0.4rem;
    }

    .done-card p {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .paused .timer-display {
      animation: pulse 2s ease infinite;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .settings { gap: 1rem; }
      .controls { gap: 0.6rem; }
      .btn-primary { padding: 0.75rem 1.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pomodoro</h1>
  <p>focus · break · repeat</p>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" id="tab-focus" onclick="switchMode('focus')">Focus</button>
  <button class="mode-tab" id="tab-break" onclick="switchMode('break')">Break</button>
</div>

<div class="ring-wrap" id="ringWrap">
  <svg class="ring-svg" viewBox="0 0 100 100">
    <circle class="ring-track" cx="50" cy="50" r="44" />
    <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="44"
      stroke-dasharray="276.46"
      stroke-dashoffset="0" />
  </svg>
  <div class="ring-center">
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="timer-label" id="timerLabel">FOCUS</div>
    <div class="session-count" id="sessionCount">session 1</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-sm" id="resetBtn" onclick="resetTimer()">Reset</button>
  <button class="btn btn-primary" id="mainBtn" onclick="toggleTimer()">Start</button>
  <button class="btn btn-sm" onclick="skipCycle()">Skip</button>
</div>

<div class="settings">
  <div class="setting-group">
    <label>Focus (min)</label>
    <input type="number" id="focusMin" value="25" min="1" max="99" onchange="onSettingsChange()" />
  </div>
  <div class="setting-group">
    <label>Break (min)</label>
    <input type="number" id="breakMin" value="5" min="1" max="99" onchange="onSettingsChange()" />
  </div>
</div>

<hr class="divider" />

<section class="history-section">
  <div class="history-header">
    <h2>Today's Sessions</h2>
    <span id="historyDate"></span>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">No sessions yet — start focusing!</div>
  </div>
</section>

<!-- Done overlay -->
<div class="done-flash" id="doneFlash">
  <div class="done-card">
    <h2 id="doneTitle">Session Done!</h2>
    <p id="doneSubtitle">Time for a break.</p>
    <button class="btn btn-primary" onclick="dismissDone()">Continue</button>
  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────
  const CIRCUMFERENCE = 276.46; // 2π × 44

  let mode = 'focus';           // 'focus' | 'break'
  let running = false;
  let intervalId = null;
  let totalSeconds = 25 * 60;
  let remaining = totalSeconds;
  let sessionNumber = 1;
  let completedToday = 0;

  const ring = document.getElementById('ringProgress');
  const display = document.getElementById('timerDisplay');
  const label = document.getElementById('timerLabel');
  const mainBtn = document.getElementById('mainBtn');
  const sessionCount = document.getElementById('sessionCount');
  const ringWrap = document.getElementById('ringWrap');
  const doneFlash = document.getElementById('doneFlash');

  // ─── localStorage history ─────────────────────────────────────
  const HISTORY_KEY = 'pomodoro_history';
  const DATE_KEY = 'pomodoro_date';

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function loadHistory() {
    const savedDate = localStorage.getItem(DATE_KEY);
    if (savedDate !== todayStr()) {
      localStorage.removeItem(HISTORY_KEY);
      localStorage.setItem(DATE_KEY, todayStr());
    }
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  }

  function saveHistory(entries) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(entries));
  }

  function addHistoryEntry(type, durationMin) {
    const entries = loadHistory();
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    entries.unshift({ type, durationMin, timeStr, id: Date.now() });
    saveHistory(entries);
    renderHistory();
  }

  function renderHistory() {
    const entries = loadHistory();
    const list = document.getElementById('historyList');
    const dateEl = document.getElementById('historyDate');
    dateEl.textContent = new Date().toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });

    if (entries.length === 0) {
      list.innerHTML = '<div class="history-empty">No sessions yet — start focusing!</div>';
      return;
    }

    list.innerHTML = entries.map(e => `
      <div class="history-item">
        <div class="history-dot ${e.type === 'break' ? 'break' : ''}"></div>
        <div class="history-text">✓ ${e.durationMin}:00 ${e.type}</div>
        <div class="history-time">${e.timeStr}</div>
      </div>
    `).join('');
  }

  // ─── Timer logic ──────────────────────────────────────────────
  function getFocusMin() { return parseInt(document.getElementById('focusMin').value) || 25; }
  function getBreakMin() { return parseInt(document.getElementById('breakMin').value) || 5; }

  function getDuration() {
    return (mode === 'focus' ? getFocusMin() : getBreakMin()) * 60;
  }

  function applyAccent() {
    const color = mode === 'focus'
      ? 'var(--focus-color)'
      : 'var(--break-color)';
    document.documentElement.style.setProperty('--accent', color);
    ring.style.stroke = `var(--accent)`;
    ring.style.filter = `drop-shadow(0 0 8px ${mode === 'focus' ? '#e8c97a' : '#7ac4e8'})`;
  }

  function updateRing() {
    const pct = remaining / totalSeconds;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function updateDisplay() {
    display.textContent = formatTime(remaining);
    label.textContent = running
      ? mode.toUpperCase()
      : (remaining === totalSeconds ? mode.toUpperCase() : 'PAUSED');
    sessionCount.textContent = `session ${sessionNumber}`;
    updateRing();
  }

  function tick() {
    if (remaining <= 0) {
      cycleComplete();
      return;
    }
    remaining--;
    updateDisplay();
  }

  function cycleComplete() {
    clearInterval(intervalId);
    running = false;
    const finished = mode;
    const dur = mode === 'focus' ? getFocusMin() : getBreakMin();
    addHistoryEntry(finished, dur);
    playDone();
    showDone(finished);
    // auto switch
    if (mode === 'focus') {
      sessionNumber++;
      switchMode('break', true);
    } else {
      switchMode('focus', true);
    }
  }

  function toggleTimer() {
    if (running) {
      clearInterval(intervalId);
      running = false;
      mainBtn.textContent = 'Resume';
      ringWrap.classList.add('paused');
    } else {
      running = true;
      intervalId = setInterval(tick, 1000);
      mainBtn.textContent = 'Pause';
      ringWrap.classList.remove('paused');
    }
    updateDisplay();
  }

  function resetTimer() {
    clearInterval(intervalId);
    running = false;
    totalSeconds = getDuration();
    remaining = totalSeconds;
    mainBtn.textContent = 'Start';
    ringWrap.classList.remove('paused');
    updateDisplay();
  }

  function skipCycle() {
    clearInterval(intervalId);
    running = false;
    if (mode === 'focus') switchMode('break', true);
    else switchMode('focus', true);
  }

  function switchMode(m, silent = false) {
    mode = m;
    document.getElementById('tab-focus').classList.toggle('active', m === 'focus');
    document.getElementById('tab-break').classList.toggle('active', m === 'break');
    applyAccent();
    totalSeconds = getDuration();
    remaining = totalSeconds;
    running = false;
    mainBtn.textContent = 'Start';
    ringWrap.classList.remove('paused');
    if (!silent) clearInterval(intervalId);
    updateDisplay();
  }

  function onSettingsChange() {
    if (!running) resetTimer();
  }

  // ─── Audio ────────────────────────────────────────────────────
  function playDone() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.18, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t);
        osc.stop(t + 0.5);
      });
    } catch(e) {}
  }

  // ─── Done overlay ─────────────────────────────────────────────
  function showDone(finishedMode) {
    document.getElementById('doneTitle').textContent =
      finishedMode === 'focus' ? '🎯 Focus Complete!' : '☕ Break Over!';
    document.getElementById('doneSubtitle').textContent =
      finishedMode === 'focus' ? 'Great work. Time for a break.' : 'Ready to focus again?';
    doneFlash.classList.add('show');
  }

  function dismissDone() {
    doneFlash.classList.remove('show');
  }

  // ─── Init ─────────────────────────────────────────────────────
  applyAccent();
  updateDisplay();
  renderHistory();
</script>
</body>
</html>
